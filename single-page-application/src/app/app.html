<!-- Shell de la SPA: barra de navegacion contextual + outlet de rutas. -->

@if (sesion.estaAutenticado()) {
  <nav class="nav-principal">
    <span class="nav-marca">LobbyOne</span>

    @if (sesion.esAdministrador()) {
      <a routerLink="/admin/habitaciones" routerLinkActive="activo">Habitaciones</a>
      <a routerLink="/admin/servicios" routerLinkActive="activo">Servicios</a>
      <a routerLink="/admin/perfiles" routerLinkActive="activo">Huéspedes</a>
      <a routerLink="/admin/ofertas" routerLinkActive="activo">Ofertas</a>
      <a routerLink="/admin/reservas" routerLinkActive="activo">Reservas</a>
    } @else {
      <a routerLink="/reservar" routerLinkActive="activo">Mis Reservas</a>
    }

    <a routerLink="/perfil" routerLinkActive="activo">Mi perfil</a>

    <span class="nav-usuario">{{ sesion.usuario()?.nombre }}</span>
    <button type="button" class="btn-cerrar" (click)="cerrarSesion()">Cerrar sesion</button>
  </nav>
} @else {
  <nav class="nav-principal">
    <span class="nav-marca">LobbyOne</span>
    <a routerLink="/login" routerLinkActive="activo">Iniciar sesion</a>
    <a routerLink="/registro" routerLinkActive="activo">Registrarse</a>
  </nav>
}

<router-outlet />
