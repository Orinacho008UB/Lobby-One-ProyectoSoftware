# ===========================================================================
# Lobby One - Aplicacion API
# Configuracion del backend. Corre en localhost (no se despliega a internet).
# ===========================================================================

# Nombre de la aplicacion
spring.application.name=lobby-one-aplicacion-api

# ---------------------------------------------------------------------------
# Servidor
# ---------------------------------------------------------------------------
server.port=8080

# ---------------------------------------------------------------------------
# Correo SMTP (Mailtrap) - NotificationComponent
# Las credenciales reales las pondra el equipo (reemplazar placeholders).
# ---------------------------------------------------------------------------
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=TU_USUARIO_MAILTRAP
spring.mail.password=TU_PASSWORD_MAILTRAP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---------------------------------------------------------------------------
# Almacenamiento local (Almacen de Datos y Almacen de Imagenes)
# Rutas base relativas a la raiz de aplicacion-api/.
# ---------------------------------------------------------------------------
lobbyone.data.ruta-base=data
lobbyone.imagenes.ruta-base=images
